game:
  game_rule: "v1.2"
  max_time: 100
  interaction_model:
    tagging: both_kill
    capture: kill
    prioritize: tagging
  payoff_model:
    model: zero_sum_reward
    constants:
      red_capture: 1.0
      blue_capture: 1.0
      red_killed: 0.5
      blue_killed: 0.5


agents:
  red_global:
    speed: 1
    capture_radius: 2
    sensing_radius: 400
    # sensing_radius: 350
    sensors:
    - global_map
    - candidate_flag
    - agent
    - name: egocentric_flag
      model: red_flag_r400
      carrier: agent
      flags: real
    - egocentric_flag_region
  blue_global:
    speed: 1
    tagging_radius: 1
    sensing_radius: 250
    # sensing_radius: 300
    sensors:
    - global_map
    - custom_team
    - name: egocentric_agent
      model: blue_agent_r250
      carrier: agent
      team: blue
    - egocentric_agent_region
    - flag
    - name: stationary
      model: blue_tower_r450
      at: blue_static_sensor_positions
  red_config: {}
  blue_config: {}

flags:
  real_positions: null
  candidate_positions: null
environment:
  graph_name: null
  blue_stationary_sensor_radius: 450
  blue_static_sensor_positions: null
  visibility_models:
    red_flag_r400: {type: line_of_sight, crs: EPSG:32618, max_range: 400}
    blue_agent_r250: {type: line_of_sight, crs: EPSG:32618, max_range: 250}
    blue_tower_r450: {type: line_of_sight, crs: EPSG:32618, max_range: 450}
generator: {}
